<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>場地預約系統 - 旺龍匹克球社</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-100 p-4 md:p-6 min-h-screen">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden">
        
        <div class="bg-blue-900 p-6 text-white text-center">
            <h2 class="text-2xl font-bold mb-2">場地預約系統</h2>
            <div id="profile" class="flex items-center justify-center space-x-3 hidden mt-4 bg-blue-800 p-3 rounded-lg">
                <img id="pictureUrl" class="w-10 h-10 rounded-full border-2 border-white" src="">
                <p id="displayName" class="font-bold text-sm"></p>
            </div>
        </div>

        <div id="loading" class="p-8 text-center text-gray-500 font-bold flex flex-col items-center">
            <svg class="animate-spin h-8 w-8 text-blue-600 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p>正在同步您的預約資料...</p>
        </div>

        <div id="bookingList" class="p-6 space-y-4 hidden">
            </div>

    </div>

    <script>
        // ⚠️【請替換】您的 GAS 網址與 LIFF ID
        const GAS_URL = "https://script.google.com/macros/s/您的GAS應用程式網址/exec"; 
        const LIFF_ID = "您的_LIFF_ID"; 

        // 📅【設定】在這裡設定您開放預約的時段與場地
        const availableSessions = [
            { id: "2026-06-20-A", dateText: "2026/06/20 (六) 14:00-16:00", court: "A場" },
            { id: "2026-06-20-B", dateText: "2026/06/20 (六) 14:00-16:00", court: "B場" },
            { id: "2026-06-21-A", dateText: "2026/06/21 (日) 09:00-11:00", court: "A場" }
        ];

        // 紀錄使用者已預約的清單 (從資料庫抓取後存放在此)
        let myBookedIds = [];

        // 1. 初始化 LINE LIFF 與網頁
        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { 
                    liff.login(); 
                    return;
                } 
                
                // 顯示個人資訊
                const profile = await liff.getProfile();
                document.getElementById('displayName').innerText = profile.displayName;
                document.getElementById('pictureUrl').src = profile.pictureUrl;
                document.getElementById('profile').classList.remove('hidden');
                window.userId = profile.userId;

                // 讀取該使用者的預約紀錄
                await fetchMyBookings();

            } catch (err) {
                console.error("初始化失敗:", err);
                alert("系統初始化失敗，請重新載入網頁。");
            }
        }

        // 2. 從 GAS 讀取個人預約紀錄
        async function fetchMyBookings() {
            try {
                // 向後端請求資料，action 設定為 'get_bookings'
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "get_bookings",
                        userId: window.userId,
                        apiToken: "WANGLONG_SECURE_2026"
                    })
                    // 注意：這裡不能加 mode: 'no-cors'，否則會讀不到回傳的資料
                });
                
                const result = await response.json();
                
                if (result.status === "success") {
                    myBookedIds = result.bookedIds; // 例如回傳 ["2026-06-20-A"]
                }
            } catch (error) {
                console.error("讀取預約資料失敗:", error);
                // 即使失敗，還是可以讓畫面顯示出來，只是可能抓不到舊資料
            } finally {
                // 隱藏載入中，顯示列表
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('bookingList').classList.remove('hidden');
                renderBookingList();
            }
        }

        // 3. 渲染預約畫面 (根據是否已預約顯示不同按鈕)
        function renderBookingList() {
            const listContainer = document.getElementById('bookingList');
            listContainer.innerHTML = ""; // 清空內容

            availableSessions.forEach(session => {
                const isBooked = myBookedIds.includes(session.id);
                
                // 根據狀態決定樣式與按鈕文字
                const bgColor = isBooked ? "bg-green-50 border-green-200" : "bg-white border-gray-200";
                const statusBadge = isBooked ? `<span class="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded ml-2">已預約</span>` : "";
                
                const buttonHtml = isBooked 
                    ? `<button onclick="handleAction('${session.id}', 'cancel')" id="btn-${session.id}" class="w-full mt-3 bg-red-50 text-red-600 font-bold py-2 rounded border border-red-200 hover:bg-red-100 transition">取消預約</button>`
                    : `<button onclick="handleAction('${session.id}', 'book')" id="btn-${session.id}" class="w-full mt-3 bg-blue-600 text-white font-bold py-2 rounded shadow hover:bg-blue-700 transition">立即預約</button>`;

                const html = `
                    <div class="border rounded-lg p-4 ${bgColor} shadow-sm">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-gray-800 text-lg">${session.dateText}</h3>
                                <p class="text-sm text-gray-600 mt-1">場地：${session.court} ${statusBadge}</p>
                            </div>
                        </div>
                        ${buttonHtml}
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', html);
            });
        }

        // 4. 處理「預約」或「取消」的點擊事件
        async function handleAction(bookingId, actionType) {
            const isCancel = actionType === 'cancel';
            const actionText = isCancel ? "取消" : "預約";
            
            if (isCancel && !confirm("確定要取消這個時段的預約嗎？\n取消後將釋出名額給其他球友。")) {
                return;
            }

            const btn = document.getElementById(`btn-${bookingId}`);
            btn.disabled = true;
            btn.innerText = "處理中...";
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            const data = {
                action: actionType, // 'book' 或 'cancel'
                userId: window.userId,
                bookingId: bookingId,
                apiToken: "WANGLONG_SECURE_2026"
            };

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();

                if (result.status === "success") {
                    alert(`${actionText}成功！`);
                    // 更新本地陣列狀態
                    if (isCancel) {
                        myBookedIds = myBookedIds.filter(id => id !== bookingId);
                    } else {
                        myBookedIds.push(bookingId);
                    }
                    // 重新渲染畫面
                    renderBookingList();
                } else {
                    throw new Error(result.message || "未知的錯誤");
                }
            } catch (err) {
                alert(`系統忙碌中，${actionText}失敗，請稍後再試。`);
                // 恢復按鈕狀態
                renderBookingList(); 
            }
        }

        // 啟動程式
        main();
    </script>
</body>
</html>
