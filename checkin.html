<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旺龍匹克球社 - 現場掃碼報到</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-100 p-6 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-6 border-t-4 border-green-600">
        <h2 class="text-2xl font-black text-green-900 mb-2 text-center">✅ 現場掃碼報到</h2>
        <p class="text-xs text-gray-500 text-center mb-6">歡迎來到球場！請確認報到者姓名</p>
        
        <form id="checkinForm" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">👤 報到球友姓名</label>
                <input type="text" id="playerName" name="playerName" required class="w-full border-2 border-gray-200 p-3 rounded-lg focus:border-green-500 text-green-900 font-bold" placeholder="請輸入報到者的真實姓名">
                <p class="text-xs text-gray-500 mt-2">預設為您的名字。若要幫已註冊的家人打卡，請直接修改為家人的姓名。</p>
            </div>

            <input type="hidden" name="action" value="checkin">
            <button type="submit" id="submitBtn" class="w-full bg-green-600 text-white font-black py-4 rounded-xl shadow-md hover:bg-green-700 text-lg transition-all">送出打卡</button>
        </form>
    </div>

    <script>
        // ⚠️【請填入您的兩把鑰匙】
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxfdaoJHvyPmKZq9dqWX2k5qy_KHnDu9g0L3UpLEkY83fL-Pqmh2GZRt6WnqWCFzRtewA/exec"; 
        const LIFF_ID = "2009510715-qaLnrQzo"; 

        async function main() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { 
                liff.login({ redirectUri: window.location.href }); 
            } else {
                const profile = await liff.getProfile();
                window.userId = profile.userId;
                // 自動把家長的 LINE 名字填入格子裡
                document.getElementById('playerName').value = profile.displayName;
            }
        }
        main();

        document.getElementById('checkinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "資料傳送中...";
            btn.disabled = true;
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            data.userId = window.userId;

            try {
                // 將打卡資料送交給大腦核對
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(data),
                    mode: 'no-cors' 
                });
                
                alert("打卡資料已送出！若資格符合，紀錄將寫入系統。");
                liff.closeWindow(); 
            } catch (err) {
                alert("網路連線失敗，請稍後再試或洽管理員。");
                btn.innerText = "重新打卡";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
