<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旺龍匹克球社 - 現場掃碼報到</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-100 p-6 flex items-center justify-center min-h-screen relative">
    
    <div id="mainContainer" class="max-w-md w-full bg-white rounded-xl shadow-lg p-6 border-t-4 border-green-600 transition-all duration-300 z-10">
        <h2 class="text-2xl font-black text-green-900 mb-2 text-center">✅ 現場掃碼報到</h2>
        <p class="text-xs text-gray-500 text-center mb-6">歡迎來到球場！請確認報到者姓名</p>
        
        <form id="checkinForm" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">👤 報到球友姓名</label>
                <input type="text" id="playerName" name="playerName" required class="w-full border-2 border-gray-200 p-3 rounded-lg focus:border-green-500 text-green-900 font-bold text-lg" placeholder="請輸入報到者的真實姓名">
                <p class="text-xs text-gray-500 mt-2">預設為您的名字。若要幫家人打卡，請直接修改姓名。</p>
            </div>

            <input type="hidden" name="action" value="checkin">
            <button type="submit" id="submitBtn" class="w-full bg-green-600 text-white font-black py-4 rounded-xl shadow-md hover:bg-green-700 text-lg transition-all">送出打卡</button>
        </form>
    </div>

    <div id="bookingModal" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50 hidden transition-opacity duration-300 opacity-0">
        <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full transform transition-all duration-300 scale-95 opacity-0 border-2 border-green-100" id="modalBody">
            <div class="text-center">
                <div class="text-7xl mb-4 animate-bounce">✅</div>
                <h2 class="text-3xl font-black text-green-600 mb-2 tracking-tight">報到成功！</h2>
                
                <p class="text-gray-600 font-bold mb-6 pb-4 border-b border-gray-100" id="modalSubText"></p>
                
                <p class="text-gray-800 text-lg mb-8 font-medium leading-relaxed">
                    為了方便安排場地<br>要順便預約<strong class="text-blue-600">「下週」</strong>的時段嗎？
                </p>
                
                <div class="flex flex-col space-y-3">
                    <button id="confirmBookingBtn" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-700 text-lg transition-all flex items-center justify-center">
                        <span class="mr-2">📅</span> 我要預約下週
                    </button>
                    <button id="cancelBookingBtn" class="w-full bg-gray-100 text-gray-500 font-bold py-3 rounded-xl hover:bg-gray-200 transition-all">
                        稍後再說
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️【請確認】這三組網址是否正確 ⚠️
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxfdaoJHvyPmKZq9dqWX2k5qy_KHnDu9g0L3UpLEkY83fL-Pqmh2GZRt6WnqWCFzRtewA/exec"; 
        const LIFF_ID = "2009510715-qaLnrQzo"; // 報到系統的 LIFF
        const BOOKING_LIFF_URL = "https://liff.line.me/2009510715-QgFwZuQs"; // 預約系統的 LIFF

        async function main() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { 
                liff.login({ redirectUri: window.location.href }); 
            } else {
                const profile = await liff.getProfile();
                window.userId = profile.userId;
                
                const nameInput = document.getElementById('playerName');
                nameInput.value = "系統讀取中...";

                try {
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            action: "getRealName", 
                            userId: profile.userId, 
                            apiToken: "WANGLONG_SECURE_2026" 
                        })
                    });
                    
                    const res = await response.json();
                    
                    if (res.status === "success" && res.realName) {
                        nameInput.value = res.realName;
                    } else {
                        nameInput.value = profile.displayName; 
                    }
                } catch(e) {
                    nameInput.value = profile.displayName;
                }
            }
        }
        main();

        // --- 彈出視窗控制邏輯 ---
        function showModal(userName, courtInfo) {
            // 設定彈窗內的子標題
            document.getElementById('modalSubText').innerText = userName + " | " + courtInfo;
            
            const modal = document.getElementById('bookingModal');
            const modalBody = document.getElementById('modalBody');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalBody.classList.remove('scale-95', 'opacity-0');
            }, 10);
        }

        function hideModal() {
            const modal = document.getElementById('bookingModal');
            const modalBody = document.getElementById('modalBody');
            modal.classList.add('opacity-0');
            modalBody.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // 綁定彈窗按鈕事件
        document.getElementById('confirmBookingBtn').addEventListener('click', () => {
            window.location.href = BOOKING_LIFF_URL; // 跳轉去預約
        });
        document.getElementById('cancelBookingBtn').addEventListener('click', hideModal); // 關閉彈窗，看底下的票卡


        // --- 表單送出邏輯 ---
        document.getElementById('checkinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "資料核對中...";
            btn.disabled = true;
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            data.userId = window.userId;
            data.apiToken = "WANGLONG_SECURE_2026";

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                
                const res = await response.json();

                if (res.status === "success") {
                    const now = new Date();
                    const timeString = now.toLocaleString('zh-TW', { hour12: false });
                    const courtDisplay = res.courtInfo ? res.courtInfo : "現場候補 (今日無預約)";

                    // 1. 產生底層的綠色報到票卡
                    document.getElementById('mainContainer').innerHTML = `
                        <div class="text-center flex flex-col items-center justify-center py-2">
                            <h2 class="text-2xl font-black text-green-900 mb-5">報到明細</h2>
                            
                            <div class="w-full bg-green-50 rounded-xl p-5 text-left border-2 border-green-200 mb-6 shadow-inner">
                                <p class="mb-3 text-gray-500 text-sm">👤 <strong class="text-gray-700">球友姓名</strong> <br><span class="text-blue-800 text-xl font-black tracking-wide">${res.userName}</span></p>
                                <p class="mb-3 text-gray-500 text-sm">🏓 <strong class="text-gray-700">今日場地</strong> <br><span class="text-red-600 text-xl font-black">${courtDisplay}</span></p>
                                <p class="text-gray-500 text-sm">⏰ <strong class="text-gray-700">打卡時間</strong> <br><span class="text-gray-800 font-bold">${timeString}</span></p>
                            </div>
                            
                            <p class="text-red-600 font-bold mb-5 text-sm">⚠️ 請將此畫面出示給現場管理員</p>
                            <button onclick="liff.closeWindow()" class="w-full bg-gray-600 text-white font-black py-4 rounded-xl shadow-md hover:bg-gray-700 text-lg transition-all">我已出示，關閉視窗</button>
                        </div>
                    `;

                    // 2. 延遲 0.3 秒後，跳出上層的精美預約彈窗
                    setTimeout(() => {
                        showModal(res.userName, courtDisplay);
                    }, 300);

                } else {
                    alert(res.message);
                    btn.innerText = "重新送出打卡";
                    btn.disabled = false;
                }
                
            } catch (err) {
                alert("網路連線失敗，請稍後再試或洽現場管理員。");
                btn.innerText = "重新送出打卡";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
