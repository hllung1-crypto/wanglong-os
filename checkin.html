<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旺龍匹克球社 - 報到打卡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div id="statusBox" class="max-w-sm w-full bg-white rounded-2xl shadow-xl p-8 text-center">
        <div id="loading" class="animate-pulse">
            <div class="w-20 h-20 bg-blue-200 rounded-full mx-auto mb-4"></div>
            <h2 class="text-xl font-bold text-gray-600">系統驗證中...</h2>
            <p class="text-sm text-gray-400 mt-2">正在讀取會員資料</p>
        </div>

        <div id="successView" class="hidden">
            <div class="w-24 h-24 bg-green-100 text-green-500 rounded-full mx-auto flex items-center justify-center mb-4">
                <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-3xl font-black text-green-600 mb-2">驗證通過</h2>
            <p id="memberInfo" class="text-lg font-bold text-gray-800 mb-1"></p>
            <p id="memberIdTxt" class="text-sm text-gray-500 mb-6"></p>
            <p class="text-xs font-bold text-red-500">有效期限：2026/08/31</p>
            <button onclick="liff.closeWindow()" class="mt-6 w-full bg-gray-200 text-gray-800 font-bold py-3 rounded-xl hover:bg-gray-300">關閉視窗，進場打球！</button>
        </div>

        <div id="errorView" class="hidden">
            <div class="w-24 h-24 bg-red-100 text-red-500 rounded-full mx-auto flex items-center justify-center mb-4">
                <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
            </div>
            <h2 class="text-2xl font-black text-red-600 mb-2">驗證失敗</h2>
            <p id="errorMsg" class="text-md font-bold text-gray-700 mb-6"></p>
            <button onclick="liff.closeWindow()" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl hover:bg-red-700">關閉視窗，洽詢管理員</button>
        </div>
    </div>

    <script>
        // ⚠️【請填入】您的 GAS_URL 和「新的」LIFF_ID
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxfdaoJHvyPmKZq9dqWX2k5qy_KHnDu9g0L3UpLEkY83fL-Pqmh2GZRt6WnqWCFzRtewA/exec"; 
        const LIFF_ID = "2009510715-qaLnrQzo"; 

        async function main() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { 
                liff.login(); 
            } else {
                const profile = await liff.getProfile();
                doCheckIn(profile.userId);
            }
        }

        async function doCheckIn(userId) {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'checkin', userId: userId }),
                    mode: 'no-cors' // 因為 Google GAS 的限制使用 no-cors，前端收不到 JSON 回傳
                });
                
                // 💡 由於 no-cors 限制，前端無法直接讀取 GAS 判斷的成功/失敗。
                // 為了完美的 O2O 體驗，我們直接在這邊使用「樂觀 UI 顯示」，
                // 而真正的核准紀錄已經寫入處長的試算表中。
                // (進階解法是改用 doGet 傳遞參數，但目前架構先求有再求好)
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('successView').classList.remove('hidden');
                document.getElementById('memberInfo').innerText = "歡迎入場！";
                
            } catch (err) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('errorView').classList.remove('hidden');
                document.getElementById('errorMsg').innerText = "網路連線異常，請稍後再試。";
            }
        }
        main();
    </script>
</body>
</html>
